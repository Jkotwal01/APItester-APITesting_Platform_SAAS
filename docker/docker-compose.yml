version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AITester Infrastructure Stack
# Services: PostgreSQL 16 + Redis 7
#
# Usage:
#   Start:   docker compose -f docker/docker-compose.yml up -d
#   Stop:    docker compose -f docker/docker-compose.yml down
#   Logs:    docker compose -f docker/docker-compose.yml logs -f
#   Reset:   docker compose -f docker/docker-compose.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aitester:latest
    container_name: aitester_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aitester:password@postgres:5432/aitester
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aitester-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aitester_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aitester
      POSTGRES_USER: aitester
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d   # optional SQL init scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitester -d aitester"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aitester-net

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aitester_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - aitester-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  aitester-net:
    driver: bridge
    name: aitester-net
